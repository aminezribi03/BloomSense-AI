<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iris Species Predictor</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
   
    :root {
      --primary-color: #007aff;
      --background-start: #f5f5f7;
      --background-end: #e0e0e0;
      --card-bg: #ffffff;
      --card-shadow: rgba(0, 0, 0, 0.1);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, var(--background-start), var(--background-end));
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    h1, h2, h3 {
      color: #333;
      margin-top: 0;
      text-align: center;
    }
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 8px 16px var(--card-shadow);
      padding: 24px;
      margin-top: 24px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input[type="number"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    button {
      background-color: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    button:hover {
      background-color: #005ecb;
    }
    #result {
      font-size: 18px;
      margin-top: 16px;
      text-align: center;
      line-height: 1.5;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #f2f2f2;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Iris Species Predictor</h1>
    <div class="card">
      <h2>Enter Measurements</h2>
      <label for="sepal_length">Sepal Length (cm)</label>
      <input id="sepal_length" type="number" step="0.1" />

      <label for="sepal_width">Sepal Width (cm)</label>
      <input id="sepal_width" type="number" step="0.1" />

      <label for="petal_length">Petal Length (cm)</label>
      <input id="petal_length" type="number" step="0.1" />

      <label for="petal_width">Petal Width (cm)</label>
      <input id="petal_width" type="number" step="0.1" />

      <button onclick="submitPrediction()">Predict</button>

      <div id="result"></div>
    </div>

    <div class="card">
      <h2>Prediction History</h2>
      <canvas id="historyChart"></canvas>
    </div>

    <div class="card">
      <h2>Model Metrics</h2>
      <div id="metrics"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000';
    let historyChart;
    const speciesNames = ['setosa', 'versicolor', 'virginica'];

    async function fetchHistory() {
      try {
        const res = await fetch(`${API_BASE}/history`);
        const data = await res.json();
        const labels = data.history.map(item => item.class_label);
        const counts = data.history.map(item => item.count);
        if (historyChart) {
          historyChart.data.labels = labels;
          historyChart.data.datasets[0].data = counts;
          historyChart.update();
        } else {
          const ctx = document.getElementById('historyChart').getContext('2d');
          historyChart = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: labels,
              datasets: [{
                label: 'Number of Predictions',
                data: counts,
                borderWidth: 1
              }]
            },
            options: {
              scales: {
                y: {
                  beginAtZero: true
                }
              }
            }
          });
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function fetchMetrics() {
      try {
        const res = await fetch(`${API_BASE}/metrics`);
        if (!res.ok) {
          document.getElementById('metrics').innerHTML = '<p>No metrics available.</p>';
          return;
        }
        const metrics = await res.json();
        let html = '';
        if (metrics.cv_results) {
          html += `<p><strong>Cross‑validation accuracy:</strong> ${(metrics.cv_results.cv_mean_accuracy * 100).toFixed(2)}% ± ${(metrics.cv_results.cv_std_accuracy * 100).toFixed(2)}%</p>`;
        }
        html += `<p><strong>Test accuracy:</strong> ${(metrics.test_accuracy * 100).toFixed(2)}%</p>`;
        if (metrics.classification_report) {
          html += '<h3>Classification Report</h3>';
          html += '<table><tr><th>Class</th><th>Precision</th><th>Recall</th><th>F1‑Score</th><th>Support</th></tr>';
          Object.keys(metrics.classification_report).forEach(label => {
            const row = metrics.classification_report[label];
            // Skip aggregate rows such as 'accuracy', 'macro avg', 'weighted avg'
            if (typeof row === 'object' && row.precision !== undefined) {
              const precision = (row.precision * 100).toFixed(2);
              const recall = (row.recall * 100).toFixed(2);
              const f1 = (row["f1-score"] * 100).toFixed(2);
              html += `<tr><td>${label}</td><td>${precision}%</td><td>${recall}%</td><td>${f1}%</td><td>${row.support}</td></tr>`;
            }
          });
          html += '</table>';
        }
        document.getElementById('metrics').innerHTML = html;
      } catch (err) {
        console.error(err);
        document.getElementById('metrics').innerHTML = '<p>Error loading metrics.</p>';
      }
    }

    async function submitPrediction() {
      const sepal_length = parseFloat(document.getElementById('sepal_length').value);
      const sepal_width = parseFloat(document.getElementById('sepal_width').value);
      const petal_length = parseFloat(document.getElementById('petal_length').value);
      const petal_width = parseFloat(document.getElementById('petal_width').value);
      if ([sepal_length, sepal_width, petal_length, petal_width].some(v => isNaN(v))) {
        alert('Please enter valid numerical values for all measurements.');
        return;
      }
      const payload = {
        sepal_length,
        sepal_width,
        petal_length,
        petal_width
      };
      try {
        const res = await fetch(`${API_BASE}/predict`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const errData = await res.json();
          alert('Prediction failed: ' + errData.detail);
          return;
        }
        const result = await res.json();
        const species = speciesNames[result.predicted_class] || result.predicted_class;
        document.getElementById('result').innerHTML = `<p><strong>Predicted species:</strong> ${species}</p><p><strong>Probability:</strong> ${(result.probability * 100).toFixed(2)}%</p>`;
        // Refresh history and metrics after each prediction
        fetchHistory();
        fetchMetrics();
      } catch (err) {
        console.error(err);
        alert('An error occurred while making the prediction.');
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      fetchHistory();
      fetchMetrics();
    });
  </script>
</body>
</html>
